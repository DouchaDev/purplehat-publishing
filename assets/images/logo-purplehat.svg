<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 42" aria-hidden="true">
  <!-- Shadow -->
  <ellipse cx="20" cy="35" rx="13" ry="3.5" fill="#1a0d30" opacity="0.45"/>
  <!-- Wide brim -->
  <ellipse cx="20" cy="30" rx="14.5" ry="4" fill="#4a2d8a"/>
  <!-- Brim highlight edge -->
  <ellipse cx="20" cy="29.5" rx="14.5" ry="3.5" fill="none" stroke="#7a5cbf" stroke-width="0.7" opacity="0.6"/>
  <!-- Hat body (tall cone) -->
  <path d="M20 3 C19.5 3 9 26 9 30 L31 30 C31 26 20.5 3 20 3Z" fill="#6040b0"/>
  <!-- Inner shadow on brim -->
  <ellipse cx="20" cy="30" rx="11" ry="2.8" fill="#2a1460" opacity="0.5"/>
  <!-- Gold band -->
  <path d="M10.5 26.5 Q20 24.5 29.5 26.5 L30 28.5 Q20 26.5 10 28.5 Z" fill="#C9A96E"/>
  <!-- Hat highlight (left edge) -->
  <path d="M16.5 7 L12 27" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>
  <!-- Small star/gem on band -->
  <circle cx="20" cy="27.5" r="1.1" fill="#e8c98a" opacity="0.9"/>
</svg>
